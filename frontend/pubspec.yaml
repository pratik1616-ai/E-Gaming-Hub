name: egaming_hub
description: E-Gaming Hub - Complete Gaming Platform
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Networking
  dio: ^5.3.1
  retrofit: ^4.1.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Authentication
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  google_sign_in: ^6.1.5
  
  # Push Notifications
  firebase_messaging: ^14.6.0
  
  # WebSocket
  web_socket_channel: ^2.4.0
  socket_io_client: ^1.0.2
  
  # UI Components
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # Navigation
  go_router: ^10.1.0
  
  # Date & Time
  intl: ^0.18.1
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Utils
  connectivity_plus: ^5.0.0
  device_info_plus: ^9.0.3
  package_info_plus: ^5.0.1
  shared_preferences: ^2.2.2
  
  # Analytics
  firebase_analytics: ^10.7.0
  
  # Video Player
  video_player: ^2.7.0
  
  # Camera
  camera: ^0.10.5
  
  # Image Picker
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  retrofit_generator: ^7.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
